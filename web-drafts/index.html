<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Techie — A constellation of builders.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #07091A;
      --marble: #F5F0E8;
      --gold:   #C9A84C;
      --violet: #7B61FF;
      --muted:  #4A5270;
      --white:  #FFFFFF;
      --dim:    rgba(255,255,255,0.55);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ─── HERO ─────────────────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #constellation {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* faint Roman arch silhouette */
    .arch-bg {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(700px, 90vw);
      height: min(480px, 60vh);
      border-top: 1px solid rgba(201,168,76,0.08);
      border-left: 1px solid rgba(201,168,76,0.08);
      border-right: 1px solid rgba(201,168,76,0.08);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      z-index: 1;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .hero-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .hero-headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 6.5vw, 5.2rem);
      line-height: 1.12;
      letter-spacing: -0.01em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.5s;
    }

    .hero-headline em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.02em;
      line-height: 1.7;
      max-width: 460px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.8s;
    }

    .hero-cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 36px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .hero-micro {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.6s;
    }
    .scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite 2s;
    }

    /* ─── ANIMATIONS ────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* ─── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 600px) {
      .hero-headline { font-size: 2.3rem; }
      .arch-bg { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══ HERO ═══════════════════════════════════════════ -->
<section id="hero">
  <canvas id="constellation"></canvas>
  <div class="arch-bg"></div>

  <div class="hero-content">
    <p class="hero-eyebrow">Techie &nbsp;·&nbsp; Est. 2026</p>

    <h1 class="hero-headline">
      A constellation of builders.<br>
      <em>A forum for the curious.</em>
    </h1>

    <p class="hero-sub">
      Not everyone here writes code.<br>
      That's exactly why it works.
    </p>

    <div class="hero-cta-group">
      <a href="#product" class="btn-primary">Explore Techie ↓</a>
      <span class="hero-micro">Free &nbsp;·&nbsp; On Discord &nbsp;·&nbsp; No pitch</span>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ═══ CONSTELLATION CANVAS SCRIPT ════════════════════ -->
<script>
(function () {
  const canvas = document.getElementById('constellation');
  const ctx    = canvas.getContext('2d');

  const DOMAINS = ['Finance', 'Logistics', 'Design', 'Code', 'Marketing', 'Research'];
  const GOLD    = '#C9A84C';
  const VIOLET  = '#7B61FF';
  const WHITE   = 'rgba(255,255,255,0.85)';

  let W, H, nodes = [], edges = [], animFrame;
  let revealProgress = 0; // 0–1, drives the staggered entrance

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    buildGraph();
  }

  function buildGraph() {
    nodes = [];
    edges = [];

    // 6 domain nodes spread across canvas
    const positions = [
      [0.20, 0.28], [0.50, 0.18], [0.78, 0.30],
      [0.15, 0.65], [0.50, 0.72], [0.82, 0.60],
    ];

    DOMAINS.forEach((label, i) => {
      nodes.push({
        x:      positions[i][0] * W,
        y:      positions[i][1] * H,
        label,
        r:      3.5,
        pulse:  Math.random() * Math.PI * 2,
        delay:  i * 0.12,  // stagger entrance
        born:   false,
      });
    });

    // edges between nodes (constellation lines)
    const pairs = [[0,1],[1,2],[0,3],[1,4],[2,5],[3,4],[4,5],[1,3],[2,4]];
    pairs.forEach(([a,b]) => edges.push({ a, b, delay: Math.max(nodes[a].delay, nodes[b].delay) + 0.08 }));

    // add ~30 background stars
    nodes._stars = Array.from({ length: 30 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
    }));
  }

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    // advance reveal (full entrance over ~3.5s)
    revealProgress = Math.min(revealProgress + 0.004, 1);

    // background stars
    (nodes._stars || []).forEach(s => {
      s.twinkle += 0.012;
      const alpha = 0.2 + 0.15 * Math.sin(s.twinkle);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    // edges
    edges.forEach(e => {
      const t = Math.max(0, (revealProgress - e.delay) / (1 - e.delay));
      if (t <= 0) return;
      const progress = easeOut(Math.min(t * 2, 1));
      const na = nodes[e.a], nb = nodes[e.b];
      const ex = na.x + (nb.x - na.x) * progress;
      const ey = na.y + (nb.y - na.y) * progress;

      ctx.beginPath();
      ctx.moveTo(na.x, na.y);
      ctx.lineTo(ex, ey);

      const grad = ctx.createLinearGradient(na.x, na.y, nb.x, nb.y);
      grad.addColorStop(0,   'rgba(123,97,255,0.35)');
      grad.addColorStop(0.5, 'rgba(201,168,76,0.25)');
      grad.addColorStop(1,   'rgba(123,97,255,0.1)');
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 0.8;
      ctx.stroke();
    });

    // nodes + labels
    nodes.forEach((n, i) => {
      const t = Math.max(0, (revealProgress - n.delay) / (1 - n.delay));
      if (t <= 0) return;
      const alpha = easeOut(Math.min(t * 2.5, 1));

      n.pulse += 0.025;
      const glow = 6 + 4 * Math.sin(n.pulse);

      // glow ring
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glow * 3);
      grd.addColorStop(0,   `rgba(201,168,76,${alpha * 0.25})`);
      grd.addColorStop(0.5, `rgba(123,97,255,${alpha * 0.08})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(n.x, n.y, glow * 3, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // dot
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + Math.sin(n.pulse) * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${alpha})`;
      ctx.fill();

      // label
      ctx.font = `300 10px Inter, sans-serif`;
      ctx.letterSpacing = '0.12em';
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label.toUpperCase(), n.x, n.y - 12);
    });

    animFrame = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  resize();
  requestAnimationFrame(draw);
})();
</script>

</body>
</html>
